version: 2

models:
  - name: stg_cnpj_dados_receita
    description: >
      Staging de bronze.cnpj_dados_receita. Cast de datas, UPPER() em campos de texto.
      Exceção à convenção do projeto: regime_tributario já é derivado aqui (não na gold),
      pois é resultado direto dos campos booleanos da própria fonte.
    columns:
      - name: cnpj
        description: CNPJ (14 dígitos) — chave primária.
        data_tests:
          - not_null
          - unique
      - name: regime_tributario
        description: "Derivado em CASE: MEI, SIMPLES NACIONAL, REGIME NORMAL (REAL/PRESUMIDO) ou NÃO INFORMADO."
        data_tests:
          - accepted_values:
              arguments:
                values: ['MEI', 'SIMPLES NACIONAL', 'REGIME NORMAL (REAL/PRESUMIDO)', 'NÃO INFORMADO']
      - name: carregado_em
        description: Timestamp da última atualização do registro pelo script de enriquecimento.
        data_tests:
          - not_null

  - name: stg_indicadores_mercado_externo
    description: >
      Staging de bronze.indicadores_mercado_externo (IPCA via BCB, PMC via IBGE).
      Cast simples, sem derivação — usado pelo mart_meta_referencia_grupo.
    columns:
      - name: data_referencia
        description: Primeiro dia do mês de referência.
        data_tests:
          - not_null
      - name: indicador
        description: "IPCA_GERAL, IPCA_ALIMENTOS_BEBIDAS, PMC_HIPER_SUPER_INDICE ou PMC_HIPER_SUPER_VAR_ANUAL."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['IPCA_GERAL', 'IPCA_ALIMENTOS_BEBIDAS', 'PMC_HIPER_SUPER_INDICE', 'PMC_HIPER_SUPER_VAR_ANUAL']
      - name: valor
        description: Valor do indicador no mês.
        data_tests:
          - not_null

  - name: stg_nocodb_meta_parametros
    description: >
      Staging de nocodb.meta_parametros (input manual da diretoria, lido via
      postgres_fdw — ver docs/operacao/nocodb.md). Cast simples + fallback do
      Desafio pro valor de Padrão quando vazio.
    columns:
      - name: mes
        description: Mês de referência. Chave primária.
        data_tests:
          - not_null
          - unique
      - name: meta_grupo_padrao_valor
        description: Meta de faturamento do grupo (R$), cenário Padrão — definida pela diretoria.
        data_tests:
          - not_null

  - name: stg_nocodb_meta_ajustes_loja
    description: >
      Staging de nocodb.meta_ajustes_loja (input manual da diretoria, via FDW).
      Cast simples + COALESCE de ajuste vazio pra zero. Teste de soma-zero por
      mês em tests/stg_nocodb_meta_ajustes_loja_soma_zero.sql.
    columns:
      - name: mes
        description: Mês de referência — combina com stg_nocodb_meta_parametros.mes.
        data_tests:
          - not_null
      - name: empresa_id
        description: ID da loja ajustada. Nunca empresa_id = 1 (MATRIZ).
        data_tests:
          - not_null
