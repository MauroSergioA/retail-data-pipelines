version: 2

models:
  - name: stg_cnpj_dados_receita
    description: >
      Staging de bronze.cnpj_dados_receita. Cast de datas, UPPER() em campos de texto.
      Exceção à convenção do projeto: regime_tributario já é derivado aqui (não na gold),
      pois é resultado direto dos campos booleanos da própria fonte.
    columns:
      - name: cnpj
        description: CNPJ (14 dígitos) — chave primária.
        data_tests:
          - not_null
          - unique
      - name: regime_tributario
        description: "Derivado em CASE: MEI, SIMPLES NACIONAL, REGIME NORMAL (REAL/PRESUMIDO) ou NÃO INFORMADO."
        data_tests:
          - accepted_values:
              arguments:
                values: ['MEI', 'SIMPLES NACIONAL', 'REGIME NORMAL (REAL/PRESUMIDO)', 'NÃO INFORMADO']
      - name: carregado_em
        description: Timestamp da última atualização do registro pelo script de enriquecimento.
        data_tests:
          - not_null

  - name: stg_indicadores_mercado_externo
    description: >
      Staging de bronze.indicadores_mercado_externo (IPCA via BCB, PMC via IBGE).
      Cast simples, sem derivação — usado pelo mart_meta_referencia_grupo.
    columns:
      - name: data_referencia
        description: Primeiro dia do mês de referência.
        data_tests:
          - not_null
      - name: indicador
        description: "IPCA_GERAL, IPCA_ALIMENTOS_BEBIDAS, PMC_HIPER_SUPER_INDICE ou PMC_HIPER_SUPER_VAR_ANUAL."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['IPCA_GERAL', 'IPCA_ALIMENTOS_BEBIDAS', 'PMC_HIPER_SUPER_INDICE', 'PMC_HIPER_SUPER_VAR_ANUAL']
      - name: valor
        description: Valor do indicador no mês.
        data_tests:
          - not_null
