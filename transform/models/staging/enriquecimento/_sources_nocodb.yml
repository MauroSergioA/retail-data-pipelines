version: 2

sources:
  - name: nocodb
    description: >
      Tabelas editadas manualmente pela diretoria via NocoDB (base "Meta
      Comercial"), lidas via postgres_fdw — ver docs/operacao/nocodb.md e
      scripts/setup/05_pg_nocodb_fdw.sql. Schema nocodb em superque é um
      conjunto de foreign tables, não tabelas locais.
    schema: nocodb
    tables:
      - name: meta_parametros
        description: >
          Meta de faturamento do grupo por mês (cenários Padrão e Desafio) e
          janela de meses usada pro cálculo de participação histórica no
          rateio. Uma linha por mês.
        columns:
          - name: mes
            description: Mês de referência (primeiro dia do mês).
          - name: meta_grupo_padrao_valor
            description: Meta de faturamento do grupo (R$), cenário Padrão.
          - name: meta_grupo_desafio_valor
            description: Meta de faturamento do grupo (R$), cenário Desafio — se vazio, usa o valor de Padrão.
          - name: anos_historico
            description: >
              Quantos anos anteriores considerar pra calcular a participação %
              de cada loja/categoria — compara o MESMO MÊS em cada ano anterior
              (não trailing consecutivo), pra preservar sazonalidade de
              categoria (ex.: Material Escolar em jan/fev, Decoração Natalina
              em dez). Renomeado de janela_meses em 2026-06-25 — o conceito de
              "janela de meses corridos" não fazia mais sentido depois da
              correção do viés sazonal.
      - name: meta_ajustes_loja
        description: >
          Ajuste manual (zero-sum) na meta de uma loja específica, pros dois
          cenários — e também onde a diretoria VÊ o rateio calculado antes de
          decidir o ajuste (colunas calculadas escritas pelo dbt via
          macro sync_meta_ajustes_calculado, post-hook do mart_meta_comercial
          — único caso no projeto onde dbt escreve no NocoDB em vez de só
          ler). Uma linha por loja ativa por mês (criada automaticamente pelo
          sync, mesmo sem ajuste manual).
        columns:
          - name: mes
            description: Mês de referência — combina com meta_parametros.
          - name: empresa_id
            description: ID da loja (dim_empresa_info.empresa_id). Nunca empresa_id = 1 (MATRIZ).
          - name: ajuste_padrao_valor
            description: Ajuste manual (R$) na meta Padrão da loja — soma de todos os ajustes do mês deve ser zero. Único campo realmente editado pela diretoria.
          - name: ajuste_desafio_valor
            description: Ajuste manual (R$) na meta Desafio da loja — mesma regra de soma zero. Único campo realmente editado pela diretoria.
          - name: participacao_loja_calculada
            description: "[Calculado pelo dbt, não editar] Participação % da loja no faturamento do grupo."
          - name: meta_padrao_sem_ajuste
            description: "[Calculado pelo dbt, não editar] Meta Padrão da loja (R$) antes do ajuste manual."
          - name: meta_desafio_sem_ajuste
            description: "[Calculado pelo dbt, não editar] Meta Desafio da loja (R$) antes do ajuste manual."
