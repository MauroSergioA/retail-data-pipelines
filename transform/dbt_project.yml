name: retail
version: '1.0.0'
config-version: 2

profile: retail

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

seeds:
  retail:
    +schema: gold
    feriados_fixos:
      +column_types:
        mes: integer
        dia: integer
        nome: varchar

models:
  retail:
    staging:
      +materialized: view
      +schema: silver
    dw:
      +materialized: table
      +schema: gold
      mart_curva_abc:
        +tags: ['monthly']
      mart_tempo_entrega_fornecedor:
        +tags: ['monthly']
