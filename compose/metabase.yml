services:
  metabase:
    image: metabase/metabase:v0.50.8
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - /dev/urandom:/dev/random:ro
      - metabase_data:/metabase-data
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${PG_HOSTNAME}
      MB_DB_PORT: ${PG_PORT}
      MB_DB_DBNAME: ${MB_DB_DBNAME}
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASS}
      JAVA_TIMEZONE: America/Sao_Paulo
      MB_SITE_LOCALE: pt_BR
      MB_ANON_TRACKING_ENABLED: "false"
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  metabase_data:
